services:
  postgres:
    image: 'postgres:15-alpine'
    container_name: 'fieldcheck-db'
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fieldcheck-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 'fieldcheck-api'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_PROFILES_ACTIVE=prod
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fieldcheck-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: 'fieldcheck-web'
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8081/api
    depends_on:
      - backend
    networks:
      - fieldcheck-network

volumes:
  postgres_data:

networks:
  fieldcheck-network:
