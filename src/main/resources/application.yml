logging:
  level:
    org.springframework.core.env: DEBUG
server:
  port: 8081
spring:
  application:
    name: field-check

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:field_db}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true